services:
  # ─── 1. PostgreSQL Database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: "host"
    environment:
      POSTGRES_DB: room_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    # ports:
    #   - "5432:5432"   # Expõe localmente para acesso via DBeaver/psql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_rental"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 2. Backend (Node.js / Express) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: "host"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@localhost:5432/room_rental
      JWT_SECRET: ${JWT_SECRET}
    # ports:
    #   - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ─── 3. Frontend (Next.js) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    network_mode: "host"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    # ports:
    #   - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
